version: '3.8'

services:
  # ASP.NET Core Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aspnet-spa-app
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000;https://+:5001
      ConnectionStrings__DefaultConnection: "Server=db;Database=AspNetSpaTemplate;User ID=sa;Password=YourSecurePassword123!;TrustServerCertificate=true;"
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft: Warning
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aspnet-network
    volumes:
      - ./wwwroot:/app/wwwroot:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:latest
    container_name: aspnet-spa-db
    environment:
      SA_PASSWORD: YourSecurePassword123!
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    networks:
      - aspnet-network
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourSecurePassword123!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  aspnet-network:
    driver: bridge

volumes:
  sqlserver_data:
    driver: local
